<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
:root{
  --brand:#C0202E; --brand2:#9E1A26; --brand-soft:#FBE8EA;
  --gold:#2F3E4D;
  --bg:#EDF0F3; --paper:#FFFFFF;
  --ink:#16181D; --muted:#5C6470; --line:#DCE1E7;
  --t-high:#2E7D5B; --t-mid:#2F3E4D; --t-low:#9E1A26; --t-none:#9A8C84;

}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  color:var(--ink);background:var(--bg);line-height:1.62;-webkit-font-smoothing:antialiased;font-size:17px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none}
.container{max-width:1060px;margin:0 auto;padding:0 22px}
.container.tight{max-width:880px}
.hidden{display:none!important}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;border-radius:4px;padding:13px 26px;font-size:16px;transition:.15s;white-space:nowrap}
.btn-brand{background:var(--brand);color:#fff;box-shadow:0 8px 20px rgba(192,32,46,.26)}

.btn-ghost{background:transparent;color:var(--brand);border:1.5px solid var(--line)}
.btn-ghost:hover{border-color:var(--brand);background:var(--paper)}

.btn-white:hover{background:var(--brand);color:#fff}
.btn-lg{padding:16px 34px;font-size:18px;border-radius:4px}
.btn-block{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed}
header.site{position:sticky;top:0;z-index:50;background:rgba(237,240,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
header.site .container{display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{display:flex;align-items:center;gap:11px}
.brand .mark{width:34px;height:34px}
.brand .name{font-weight:800;font-size:20px;color:var(--brand)}
.brand .name small{display:block;font-weight:600;color:var(--muted);font-size:11px;letter-spacing:2px;margin-top:-2px}
.nav-links{display:flex;gap:24px;align-items:center;font-size:14px;color:var(--muted)}
.nav-links a:hover{color:var(--brand)}
@media(max-width:720px){.nav-links{display:none}}
.hero{padding:64px 0 30px}
.eyebrow{display:inline-block;font-size:13px;letter-spacing:2px;color:var(--brand2);font-weight:700;margin-bottom:18px}
.hero h1{text-wrap:balance;font-size:46px;line-height:1.2;color:var(--ink);font-weight:800;max-width:15em}
.hero h1 .u{background:linear-gradient(transparent 64%,rgba(47,62,77,.4) 64%)}
.hero .sub{font-size:20px;color:#39414c;max-width:34em;margin:22px 0 8px;line-height:1.6}
.cta-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:26px}
.assist{font-size:14px;color:var(--muted);margin-top:16px}
.cityband{display:flex;flex-wrap:nowrap;gap:7px;margin-top:26px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}

.citychip{flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:14px;color:#39414c;font-weight:600;white-space:nowrap;cursor:pointer;transition:.13s}
.citychip:hover{border-color:var(--brand);color:var(--brand);transform:translateY(-1px)}
.citychip .ar{color:var(--brand2);font-weight:700}
@media(max-width:720px){.hero{padding:40px 0 20px}.hero h1{text-wrap:balance;font-size:31px}.hero .sub{font-size:17px}}
.block{padding:56px 0}
.block.alt{background:var(--paper);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.sec-title{font-size:31px;color:var(--ink);font-weight:800}
.sec-sub{color:var(--muted);max-width:42em;margin-top:12px;font-size:17px}
@media(max-width:720px){.sec-title{font-size:24px}.block{padding:40px 0}}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:30px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:24px}
.card .ic{font-size:26px}.card h3{font-size:18px;margin:12px 0 8px;color:var(--brand)}.card p{color:#49515c;font-size:15px}
.pain-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:30px}
.pain{background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:4px;padding:18px 20px;font-size:16px;color:#39414c;display:flex;gap:12px}

.step{background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:22px 20px;position:relative}

.price-card h3{font-size:19px;color:var(--ink)}
.price-card .price{font-size:42px;font-weight:800;color:var(--brand);margin:8px 0 4px}

.price-card .desc{color:#49515c;font-size:14px;min-height:42px}
.price-card ul{list-style:none;margin:16px 0 20px}
.price-card li{font-size:14.5px;padding:7px 0 7px 24px;position:relative;border-bottom:1px dashed var(--line)}
.price-card li:before{content:"✓";position:absolute;left:0;color:var(--t-high);font-weight:800}
.page{padding:34px 0 60px;min-height:60vh}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:26px;box-shadow:var(--shadow)}
.panel+.panel{margin-top:18px}
.eyebrow2{font-size:12px;letter-spacing:2px;color:var(--brand2);font-weight:700}
.stepper{display:flex;gap:5px;margin-bottom:24px;flex-wrap:wrap}
.stepper .s{flex:1;min-width:60px;text-align:center;font-size:12px;color:var(--muted);padding-bottom:8px;border-bottom:3px solid var(--line)}
.stepper .s.active{color:var(--brand);border-color:var(--brand);font-weight:700}
.stepper .s.done{color:var(--gold);border-color:var(--gold)}
.field{margin-bottom:18px}
.field label{display:block;font-weight:600;margin-bottom:7px;font-size:15px;color:var(--ink)}
.field .hint{font-size:13px;color:var(--muted);margin-top:6px}
input[type=text],input[type=number],input[type=email],select,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:4px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand)}
textarea{min-height:84px;resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:620px){.grid2{grid-template-columns:1fr}}
.choices{display:flex;flex-wrap:wrap;gap:10px}

.choice:hover{border-color:var(--brand)}
.choice.sel{border-color:var(--brand);background:var(--brand-soft);color:var(--brand);font-weight:700}
.bars{margin:8px 0}
.bar-row{display:grid;grid-template-columns:96px 1fr 42px;align-items:center;gap:10px;margin:11px 0}
.bar-row .nm{font-size:14px;color:#39414c;font-weight:600}
.bar-track{height:13px;background:var(--brand-soft);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand2),var(--brand))}
.bar-row .vl{font-size:13px;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums}
.crow{display:flex;align-items:center;gap:14px;padding:15px 16px;border:1px solid var(--line);border-radius:4px;background:#fff;margin-bottom:11px}
.crow .fl{font-size:26px;line-height:1;flex:0 0 auto}
.crow .info{flex:1;min-width:0}
.crow .cn{font-weight:700;font-size:16px;color:var(--ink)}
.crow .pl{font-size:13px;color:var(--muted)}
.crow .sc{text-align:right}
.crow .sc b{font-size:23px;font-weight:800}
.tier-pill{display:inline-block;font-size:12px;font-weight:700;padding:3px 11px;border-radius:999px;color:#fff;margin-top:3px;white-space:nowrap}
.grade-badge{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:118px;height:118px;border-radius:50%;background:var(--brand-soft);border:3px solid var(--brand);margin:0 auto}
.grade-badge .g{font-size:40px;font-weight:800;color:var(--brand);line-height:1}
.grade-badge .l{font-size:12px;color:var(--muted)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:9px;margin:16px 0;text-align:left}
.module-chip{background:#fff;border:1px solid var(--line);border-radius:4px;padding:13px 15px;font-size:14px;color:#49515c;display:flex;align-items:center;gap:8px}
.lock-wrap{position:relative;border:1px solid var(--line);border-radius:5px;overflow:hidden;margin:18px 0}
.lock-wrap .blur{filter:blur(5px);opacity:.55;padding:20px;pointer-events:none}
.veil{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;background:linear-gradient(180deg,rgba(255,255,255,.4),rgba(255,255,255,.92));padding:20px}
.veil .lk{font-size:30px}
.unlock-list{display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:left;margin:18px 0}

.ul-item{background:#fff;border:1px solid var(--line);border-radius:4px;padding:12px 14px;position:relative}
.ul-item b{display:block;font-size:14.5px;color:var(--ink);margin-bottom:3px}
.ul-item span{font-size:12.5px;color:var(--muted);line-height:1.5}
.ul-item .pp{position:absolute;top:10px;right:10px;font-size:10px;background:var(--brand);color:#fff;padding:1px 7px;border-radius:999px;font-weight:700}
.good-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.good-grid{grid-template-columns:1fr}}
.good-item{display:flex;gap:9px;align-items:flex-start;background:var(--brand-soft);border-radius:4px;padding:11px 13px;font-size:14.5px;color:#2a2f37}
.good-item .tick{color:var(--brand);font-weight:800;flex:0 0 auto}
.path-item{border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:4px;padding:12px 14px;margin-bottom:9px}
.path-item b{display:block;color:var(--brand);font-size:15px;margin-bottom:2px}
.path-item span{font-size:14px;color:#49515c}
.report-wrap{max-width:860px;margin:0 auto}
.rsec{background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:24px;margin-bottom:16px}
.rsec h2{font-size:20px;color:var(--brand);display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;line-height:1.4}
.rsec h2 .num{background:var(--brand);color:#fff;width:30px;height:30px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 auto}
.rsec h3{font-size:16px;margin:14px 0 6px;color:var(--ink)}
.plain{list-style:none;margin:6px 0}
.plain li{padding:7px 0 7px 22px;position:relative;border-bottom:1px solid var(--line);font-size:15px;color:#39414c}
.plain li:before{content:"—";position:absolute;left:0;color:var(--gold)}
.scorecard{border:1px solid var(--line);border-radius:5px;padding:18px;margin-bottom:14px;background:linear-gradient(180deg,#fff,#f7f9fb)}
.scorecard .sc-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.scorecard .sc-head .fl{font-size:28px;flex:0 0 auto}
.scorecard .sc-head .nm{font-size:19px;color:var(--brand);font-weight:800;flex:1 1 auto;min-width:0}
.scorecard .sc-head .pathtag{font-size:12px;background:var(--brand-soft);color:var(--brand);padding:3px 10px;border-radius:999px;font-weight:600}
.scorecard .sc-score{margin-left:auto;text-align:right}
.scorecard .sc-score b{font-size:24px;font-weight:800}
.gauge{height:8px;border-radius:999px;background:var(--brand-soft);overflow:hidden;margin:4px 0 12px}
.gauge i{display:block;height:100%;border-radius:999px}
.pts{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.pts .cell{background:#fff;border:1px solid var(--line);border-radius:4px;padding:8px 12px;font-size:13px;min-width:120px}
.pts .cell .k{color:var(--muted);font-size:11px;display:block}
.pts .cell .v{font-weight:700;color:var(--ink)}
.tl{list-style:none;margin:8px 0;border-left:2px solid var(--brand-soft);padding-left:16px}
.tl li{position:relative;padding:6px 0 12px;font-size:14px;color:#39414c}
.tl li:before{content:"";position:absolute;left:-23px;top:10px;width:9px;height:9px;border-radius:50%;background:var(--gold);border:2px solid #fff;box-shadow:0 0 0 1px var(--gold)}
.costtab{width:100%;border-collapse:collapse;font-size:14px;margin-top:6px}
.costtab td{padding:8px 6px;border-bottom:1px dashed var(--line)}
.costtab td:last-child{text-align:right;font-weight:700;color:var(--brand)}
.report-actions{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 20px}
.sev{font-size:12px;font-weight:700;padding:2px 9px;border-radius:6px;color:#fff}
.share-overlay{position:fixed;inset:0;background:rgba(36,26,28,.72);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;overflow:auto}
.share-card{width:332px;background:linear-gradient(165deg,#C0202E,#9E1A26);color:#fff;border-radius:4px;padding:26px 22px 22px;box-shadow:0 24px 60px rgba(0,0,0,.45)}
.share-card .sh-brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px}
.share-card .sh-grade{text-align:center;margin:14px 0}
.share-card .sh-grade .g{font-size:60px;font-weight:800;line-height:1}
.share-card .sh-grade .s{font-size:13px;opacity:.85}
.share-card .sh-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.1);border-radius:4px;padding:9px 12px;margin-bottom:8px}
.share-card .sh-row .fl{font-size:20px}
.share-card .sh-row .nm{flex:1;font-weight:600;font-size:14px}
.share-card .sh-row .tp{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.share-card .sh-row .sc{font-weight:800;font-size:16px;min-width:26px;text-align:right}
.share-card .sh-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.22)}
.share-card .sh-foot .u{font-weight:800}
.share-card .sh-foot .c{font-size:12px;opacity:.85}
.disclaimer-box{font-size:12.5px;color:var(--muted);line-height:1.7;background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:16px}
footer.site{background:var(--ink);color:#cfd6dc;padding:36px 0;font-size:14px}
footer.site a{color:#fff}
footer.site .legal-links{margin-top:10px;display:flex;gap:18px;flex-wrap:wrap}
footer.site .legal-links a{color:#9aa4ad}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:4px;font-size:14px;z-index:400;box-shadow:var(--shadow)}
.loading-bg{position:fixed;inset:0;background:rgba(237,240,243,.85);backdrop-filter:blur(3px);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.pbar{width:300px;max-width:78vw;height:9px;border-radius:99px;background:var(--line);overflow:hidden}
.pbar i{display:block;height:100%;width:0;background:var(--brand);transition:width .4s}
.lstage{font-size:13px;color:var(--muted);min-height:18px}
@media(max-width:560px){
  body{font-size:16px}.container{padding:0 16px}
  .btn{white-space:normal;line-height:1.3;min-height:46px}.btn-lg{padding:14px 18px;font-size:16px}
  .panel{padding:18px 16px}.hero h1{text-wrap:balance;font-size:29px}.sec-title{font-size:23px}
  .value-strip{grid-template-columns:1fr 1fr}.vchip{padding:14px 12px}.vchip p{font-size:12px}
  .crow .sc b{font-size:21px}.rsec h2{font-size:17px}.rsec h2 .num{width:26px;height:26px;font-size:13px}
  .scorecard .sc-head .nm{font-size:17px}.six-wrap{grid-template-columns:1fr!important}
}
/* ===== 政务 / 档案 版式特征（覆盖样式）===== */
.sec-title,.hero h1{text-wrap:balance;letter-spacing:-.01em}
.eyebrow,.eyebrow2{position:relative;padding-left:13px}
.eyebrow::before,.eyebrow2::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:4px;height:1.05em;background:var(--brand);border-radius:1px}
.panel,.card,.price-card,.scorecard,.vchip{box-shadow:none}
.card,.price-card{border-top:3px solid var(--brand)}
.price-card.feat{border-top-color:var(--gold)}
.vchip{background:#fff;border:1px solid var(--line);border-left:3px solid var(--brand)}
.pain{border-left-width:4px;border-radius:0 4px 4px 0}
.step{border-top:3px solid var(--gold)}
.step:before{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;background:var(--brand);color:#fff;font-size:16px;border-radius:4px;font-weight:800}
.crow{border-left:3px solid var(--brand)}
.citychip,.tier-pill,.scorecard .sc-head .pathtag,.price-card .tag,.ul-item .pp,.sev,.share-card .sh-row .tp,.choice{border-radius:3px}
.btn{border-radius:3px}
.btn-lg{border-radius:3px}
/* 区块标题左侧红色块（仅左对齐时显示，居中标题不加）*/
.block:not(.alt) .sec-title{padding-left:0}
@media print{header.site,footer.site,.report-actions,.no-print{display:none!important}body{background:#fff}.rsec{break-inside:avoid;box-shadow:none}.page{padding:0}}
</style>
</head>
<body>
<header class="site">
  <div class="container">
    <a class="brand" href="#" onclick="go('home');return false">
      <svg class="mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="2" y="2" width="36" height="36" rx="9" fill="#C0202E"/>
        <rect x="8.5" y="20" width="5" height="11" rx="1" fill="#fff" fill-opacity=".9"/>
        <rect x="15.5" y="14" width="5" height="17" rx="1" fill="#fff" fill-opacity=".9"/>
        <rect x="22.5" y="9" width="5" height="22" rx="1" fill="#fff"/>

/* ---------------- 评分引擎 ---------------- */
function eduScore(level){return ({"高中及以下":.2,"全日制大专":.45,"全日制本科":.72,"硕士":.88,"博士":1})[level]??.5;}
function schoolScore(t){return ({"985 / 双一流":1,"211 / 一本":.82,"普通本科":.62,"海外院校":.9,"大专 / 其他":.42})[t]??.6;}
function ageScore(a){a=+a||0;if(a<22)return .7;if(a<=30)return 1;if(a<=35)return .9;if(a<=40)return .7;if(a<=45)return .5;if(a<=50)return .3;return .15;}
function socialScore(s){return ({"未在目标城市缴纳":.1,"1 年以内":.3,"1–3 年":.5,"3–5 年":.72,"5–7 年":.88,"7 年以上":1})[s]??.2;}
function titleScore(t){return ({"无":.15,"技能等级（中级工+）":.5,"初级职称":.45,"中级职称":.75,"高级职称":1})[t]??.2;}
function bonusScore(A){let s=.2;if(A.fresh)s=Math.max(s,.7);if(A.returnee){const sc=schoolScore(A.schoolTier);s=Math.max(s,sc>=.9?1:.7);}return Math.min(1,s);}
function factorScores(A){return {edu:eduScore(A.education),school:schoolScore(A.schoolTier),age:ageScore(A.age),social:socialScore(A.social),title:titleScore(A.title),bonus:bonusScore(A)};}
function scoreCityPath(A,ck,pk){
  const c=CITIES[ck],w=PATH_W[pk];if(!c||!w)return 0;
  const f=factorScores(A);
  let s=0,wt=0;for(const k in w){s+=w[k]*f[k];wt+=w[k];}s/=wt;
  s*=((c.open&&c.open[pk])||1);
  if(pk==="fresh"&&!A.fresh)s*=.2;
  if(pk==="returnee"&&!A.returnee)s*=.15;
  if(pk==="talent"&&eduScore(A.education)<.7)s*=.55;
  if(pk==="residence"&&socialScore(A.social)<.7)s*=.45;
  if(pk==="points"&&socialScore(A.social)<.3)s*=.6;
  if(pk==="invest"&&!A.invest)s*=.5;
  if(pk==="family"&&!A.hasLocalFamily)s*=.3;
  return Math.max(4,Math.min(99,Math.round(s*100)));
}
function bestPathFor(A,ck){
  const c=CITIES[ck];let cand=(A.paths&&A.paths.length?A.paths:c.paths).filter(p=>c.paths.includes(p));
  if(!cand.length)cand=c.paths;
  return cand.map(p=>({p,score:scoreCityPath(A,ck,p)})).sort((a,b)=>b.score-a.score)[0];
}
function tierOf(s){if(s>=78)return{k:"high",label:"高度匹配",color:"var(--t-high)"};if(s>=62)return{k:"mid",label:"较有机会",color:"var(--t-mid)"};if(s>=45)return{k:"low",label:"有难度·需补",color:"var(--t-low)"};return{k:"none",label:"暂不建议·门槛高",color:"var(--t-none)"};}
function gradeOf(s){if(s>=85)return"A";if(s>=75)return"B+";if(s>=65)return"B";if(s>=55)return"C+";if(s>=45)return"C";return"D";}
function computeResult(A){
  const targets=(A.cities&&A.cities.length?A.cities:CITY_ORDER.slice(0,5));
  const rows=targets.map(ck=>{const bp=bestPathFor(A,ck),c=CITIES[ck],t=tierOf(bp.score);
    return {key:ck,fl:c.fl,name:c.name,score:bp.score,path:bp.p,pathLabel:PATHS[bp.p].short,tier:t,note:c.note};}).sort((a,b)=>b.score-a.score);
  const overall=rows.length?rows[0].score:0;
  const f=factorScores(A);
  const factors=[
    {key:"edu",name:"学历",score:Math.round(f.edu*100)},
    {key:"school",name:"院校层次",score:Math.round(f.school*100)},
    {key:"age",name:"年龄",score:Math.round(f.age*100)},
    {key:"social",name:"社保年限",score:Math.round(f.social*100)},
    {key:"title",name:"职称 / 技能",score:Math.round(f.title*100)},
    {key:"bonus",name:"身份红利",score:Math.round(f.bonus*100)},
  ];
  const risks=[];
  if(f.edu<.7)risks.push("学历是大城市落户最硬的门槛，本科以下多数人才引进通道走不通，可考虑提升学历或走积分/技能通道。");
  if(f.social<.5)risks.push("目标城市社保/个税年限偏短，积分与居转户类通道受限，越早开始连续缴纳越有利。");
  if((+A.age||0)>=40)risks.push("年龄已过多数落户通道的加分高峰，建议优先走学历核准或抓紧窗口。");
  if(f.title<.5&&(A.paths||[]).includes("residence"))risks.push("居转户/积分很看职称，考一个中级职称能明显加分。");
  if(!risks.length)risks.push("条件整体不错，建议锁定 1–2 个最匹配城市、确认细则后尽早启动。");
  return {overall,grade:gradeOf(overall),rows,factors,risks:risks.slice(0,4)};
}

function hexRadarSVG(factors){const N=factors.length,cx=170,cy=158,R=112;const ang=i=>(-Math.PI/2)+i*2*Math.PI/N;const pt=(i,r)=>[cx+Math.cos(ang(i))*R*r,cy+Math.sin(ang(i))*R*r];const poly=(r)=>factors.map((_,i)=>pt(i,r).join(',')).join(' ');
  let rings='';[0.25,0.5,0.75,1].forEach(r=>{rings+=`<polygon points="${poly(r)}" fill="none" stroke="#D7DDE4" stroke-width="1"/>`;});
  let axes='';factors.forEach((f,i)=>{const[x,y]=pt(i,1);axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#D7DDE4" stroke-width="1"/>`;});
  const data=factors.map((f,i)=>pt(i,Math.max(.04,f.score/100)).join(',')).join(' ');
  let dots='',labels='';factors.forEach((f,i)=>{const[dx,dy]=pt(i,Math.max(.04,f.score/100));dots+=`<circle cx="${dx}" cy="${dy}" r="3.4" fill="#C0202E"/>`;const[lx,ly]=pt(i,1.22);const an=Math.abs(lx-cx)<8?'middle':(lx>cx?'start':'end');labels+=`<text x="${lx}" y="${ly-2}" font-size="12.5" font-weight="700" fill="#16181D" text-anchor="${an}">${esc(f.name)}</text><text x="${lx}" y="${ly+13}" font-size="11" fill="#5C6470" text-anchor="${an}">${f.score}</text>`;});
  return `<div style="text-align:center"><svg viewBox="0 0 340 320" style="max-width:340px;width:100%" xmlns="http://www.w3.org/2000/svg">${rings}${axes}<polygon points="${data}" fill="rgba(192,32,46,.2)" stroke="#C0202E" stroke-width="2.2"/>${dots}${labels}</svg></div>`;}

/* 支付返回 + 启动 */
async function resumeAfterPay(outTradeNo){
  showLoading('支付确认中…');let paid=false,pt=A.reportType||'premium_report';
  for(let i=0;i<8;i++){try{const r=await fetch('/api/pay/status?outTradeNo='+encodeURIComponent(outTradeNo));const j=await r.json();if(j&&j.found){if(j.productType)pt=j.productType;if(j.paid){paid=true;break;}}}catch(e){}await new Promise(s=>setTimeout(s,1500));}
  try{history.replaceState({v:'home'},'',location.pathname);}catch(e){}
  if(paid){A.isPaid=true;A.reportType=pt;saveDB();if(A.freeResult){if(A.deepenDone){go('report');}else{prepDeepen();}}else{go('report');}}
  else{toast('支付尚未确认，如已付款请稍候在“等待支付”页查看');go(A.freeResult?'freeResult':'home');}
}
window.addEventListener('DOMContentLoaded',()=>{
  loadDB();if(!A||!A.id)newAssessment();
  let psp='';try{psp=new URLSearchParams(location.search).get('hk_paid')||'';}catch(e){}
  if(psp){try{history.replaceState({v:'home'},'');}catch(e){}resumeAfterPay(psp);return;}
  try{history.replaceState({v:'home'},'');}catch(e){}RENDER.home();
});
function prevStep(){if(STEP>0){STEP--;RENDER.assessment();window.scrollTo(0,0);}}
function nextStep(){STEP++;RENDER.assessment();window.scrollTo(0,0);}
