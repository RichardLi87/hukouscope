<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
:root{
  --pine:#14503F; --pine2:#1E6B54; --pine-soft:#E8F0EA;
  --clay:#C6603D; --clay2:#A94E30;
  --gold:#B68A4E;
  --sand:#F6EFE2; --paper:#FFFDF8;
  --ink:#1B2A24; --muted:#6E7B73; --line:#E7DCC8;
  --t-high:#1E6B54; --t-mid:#B68A4E; --t-low:#C6603D; --t-none:#94897A;
  --shadow:0 1px 2px rgba(27,42,36,.06),0 10px 30px rgba(27,42,36,.07);
  --serif:"Georgia","Times New Roman","Songti SC","STSong","SimSun",serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  color:var(--ink);background:var(--sand);line-height:1.62;-webkit-font-smoothing:antialiased;font-size:17px}
h1,h2,h3,.serif{font-family:var(--serif);letter-spacing:.2px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none}
.container{max-width:1060px;margin:0 auto;padding:0 22px}
.container.tight{max-width:880px}
.hidden{display:none!important}

/* Buttons — squared, editorial */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;
  border-radius:8px;padding:13px 26px;font-size:16px;transition:.15s;white-space:nowrap}
.btn-clay{background:var(--clay);color:#fff;box-shadow:0 8px 20px rgba(198,96,61,.26)}
.btn-clay:hover{background:var(--clay2)}
.btn-pine{background:var(--pine);color:#fff}
.btn-pine:hover{background:var(--pine2)}
.btn-ghost{background:transparent;color:var(--pine);border:1.5px solid var(--line)}
.btn-ghost:hover{border-color:var(--pine);background:var(--paper)}
.btn-lg{padding:16px 34px;font-size:18px;border-radius:9px}
.btn-block{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* Header */
header.site{position:sticky;top:0;z-index:50;background:rgba(246,239,226,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
header.site .container{display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{display:flex;align-items:center;gap:11px}
.brand .mark{width:34px;height:34px}
.brand .name{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--pine)}
.brand .name small{display:block;font-family:inherit;font-weight:600;color:var(--muted);font-size:11px;letter-spacing:2px;margin-top:-2px}
.nav-links{display:flex;gap:24px;align-items:center;font-size:14px;color:var(--muted)}
.nav-links a:hover{color:var(--pine)}
@media(max-width:720px){.nav-links{display:none}}

/* Hero — left aligned editorial */
.hero{padding:64px 0 30px}
.eyebrow{display:inline-block;font-size:13px;letter-spacing:2px;color:var(--clay);font-weight:700;text-transform:uppercase;margin-bottom:18px}
.hero h1{font-size:50px;line-height:1.18;color:var(--ink);max-width:14em}
.hero h1 .u{background:linear-gradient(transparent 64%,rgba(182,138,78,.35) 64%)}
.hero .sub{font-size:20px;color:#3c4a43;max-width:34em;margin:22px 0 8px;line-height:1.6}
.cta-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:26px}
.assist{font-size:14px;color:var(--muted);margin-top:16px}
.flagband{display:flex;flex-wrap:nowrap;gap:7px;margin-top:26px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.flagband::-webkit-scrollbar{height:0}
.flagchip{flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;background:var(--paper);border:1px solid var(--line);border-radius:999px;
  padding:6px 11px;font-size:13px;color:#3c4a43;font-weight:600;white-space:nowrap}
.flagchip .fl{font-size:15px}
@media(max-width:720px){.hero{padding:40px 0 20px}.hero h1{font-size:33px}.hero .sub{font-size:17px}}

/* Sections */
.block{padding:56px 0}
.block.alt{background:var(--paper);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.sec-title{font-size:32px;color:var(--ink)}
.sec-sub{color:var(--muted);max-width:42em;margin-top:12px;font-size:17px}
@media(max-width:720px){.sec-title{font-size:25px}.block{padding:40px 0}}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:30px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:24px}
.card .ic{font-size:26px}
.card h3{font-size:18px;margin:12px 0 8px;color:var(--pine)}
.card p{color:#4a564f;font-size:15px}

.pain-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:30px}
.pain{background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--clay);border-radius:8px;padding:18px 20px;font-size:16px;color:#3c4a43;display:flex;gap:12px}
.pain .q{font-family:var(--serif);color:var(--clay);font-size:22px;font-weight:700;line-height:1}

.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:30px;counter-reset:s}
.step{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:22px 20px;position:relative}
.step:before{counter-increment:s;content:counter(s);font-family:var(--serif);font-size:30px;color:var(--gold);font-weight:700}
.step b{display:block;margin:6px 0 4px;color:var(--ink)}
.step span{font-size:14px;color:var(--muted)}
@media(max-width:680px){.steps{grid-template-columns:1fr}}

.value-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:30px}
.vchip{background:var(--pine-soft);border-radius:10px;padding:18px;text-align:left}
.vchip .ic{font-size:24px}
.vchip b{display:block;margin:8px 0 2px;color:var(--pine)}
.vchip p{font-size:13px;color:#4a564f}

.quote-band{background:var(--pine);color:#fff;border-radius:16px;padding:42px 38px;text-align:center}
.quote-band .big{font-family:var(--serif);font-size:27px;line-height:1.4}
.quote-band .small{opacity:.85;margin-top:12px;font-size:15px}
@media(max-width:720px){.quote-band{padding:30px 22px}.quote-band .big{font-size:21px}}

/* Pricing */
.pricing{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-top:34px;max-width:760px;margin-left:auto;margin-right:auto}
.price-card{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:28px 24px;position:relative}
.price-card.feat{border-color:var(--pine)}
.price-card .tag{position:absolute;top:-12px;right:20px;background:var(--gold);color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px}
.price-card h3{font-size:19px;color:var(--ink)}
.price-card .price{font-family:var(--serif);font-size:42px;font-weight:700;color:var(--pine);margin:8px 0 4px}
.price-card .price small{font-size:15px;color:var(--muted);font-weight:600}
.price-card .desc{color:#4a564f;font-size:14px;min-height:42px}
.price-card ul{list-style:none;margin:16px 0 20px}
.price-card li{font-size:14.5px;padding:7px 0 7px 24px;position:relative;border-bottom:1px dashed var(--line)}
.price-card li:before{content:"✓";position:absolute;left:0;color:var(--pine2);font-weight:800}

/* Panels / pages */
.page{padding:34px 0 60px;min-height:60vh}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:26px;box-shadow:var(--shadow)}
.panel+.panel{margin-top:18px}
.eyebrow2{font-size:12px;letter-spacing:2px;color:var(--clay);font-weight:700;text-transform:uppercase}

/* Stepper */
.stepper{display:flex;gap:5px;margin-bottom:24px;flex-wrap:wrap}
.stepper .s{flex:1;min-width:60px;text-align:center;font-size:12px;color:var(--muted);padding-bottom:8px;border-bottom:3px solid var(--line)}
.stepper .s.active{color:var(--pine);border-color:var(--pine);font-weight:700}
.stepper .s.done{color:var(--gold);border-color:var(--gold)}

/* Forms */
.field{margin-bottom:18px}
.field label{display:block;font-weight:600;margin-bottom:7px;font-size:15px;color:var(--ink)}
.field .hint{font-size:13px;color:var(--muted);margin-top:6px}
input[type=text],input[type=number],input[type=email],select,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);
  border-radius:9px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pine)}
textarea{min-height:84px;resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:620px){.grid2{grid-template-columns:1fr}}

/* choice chips */
.choices{display:flex;flex-wrap:wrap;gap:10px}
.choice{border:1.5px solid var(--line);border-radius:9px;padding:11px 16px;font-size:15px;background:#fff;color:var(--ink);transition:.12s;user-select:none}
.choice:hover{border-color:var(--pine)}
.choice.sel{border-color:var(--pine);background:var(--pine-soft);color:var(--pine);font-weight:700}
.choice .fl{margin-right:6px}

/* factor bars (distinct from radar) */
.bars{margin:8px 0}
.bar-row{display:grid;grid-template-columns:92px 1fr 42px;align-items:center;gap:10px;margin:11px 0}
.bar-row .nm{font-size:14px;color:#3c4a43;font-weight:600}
.bar-track{height:13px;background:var(--pine-soft);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--pine2),var(--pine))}
.bar-row .vl{font-size:13px;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums}

/* country result rows */
.crow{display:flex;align-items:center;gap:14px;padding:15px 16px;border:1px solid var(--line);border-radius:11px;background:#fff;margin-bottom:11px}
.crow .fl{font-size:30px;line-height:1}
.crow .info{flex:1;min-width:0}
.crow .cn{font-weight:700;font-size:16px;color:var(--ink)}
.crow .pl{font-size:13px;color:var(--muted)}
.crow .sc{text-align:right}
.crow .sc b{font-family:var(--serif);font-size:24px}
.tier-pill{display:inline-block;font-size:12px;font-weight:700;padding:3px 11px;border-radius:999px;color:#fff;margin-top:3px}

.grade-badge{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:118px;height:118px;border-radius:50%;
  background:var(--pine-soft);border:3px solid var(--pine);margin:0 auto}
.grade-badge .g{font-family:var(--serif);font-size:40px;font-weight:700;color:var(--pine);line-height:1}
.grade-badge .l{font-size:12px;color:var(--muted)}

/* locked modules */
.module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:9px;margin:16px 0;text-align:left}
.module-chip{background:#fff;border:1px solid var(--line);border-radius:9px;padding:13px 15px;font-size:14px;color:#4a564f;display:flex;align-items:center;gap:8px}
.lock-wrap{position:relative;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:18px 0}
.lock-wrap .blur{filter:blur(5px);opacity:.55;padding:20px;pointer-events:none}
.veil{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;
  background:linear-gradient(180deg,rgba(255,253,248,.4),rgba(255,253,248,.92));padding:20px}
.veil .lk{font-size:30px}

/* report */
.report-wrap{max-width:860px;margin:0 auto}
.rsec{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:24px;margin-bottom:16px}
.rsec h2{font-size:20px;color:var(--pine);display:flex;align-items:center;gap:10px;margin-bottom:14px}
.rsec h2 .num{font-family:var(--serif);background:var(--pine);color:#fff;width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 auto}
.rsec h3{font-size:16px;margin:14px 0 6px;color:var(--ink)}
.plain{list-style:none;margin:6px 0}
.plain li{padding:7px 0 7px 22px;position:relative;border-bottom:1px solid var(--line);font-size:15px;color:#3c4a43}
.plain li:before{content:"—";position:absolute;left:0;color:var(--gold)}
.kbox{background:var(--pine);color:#fff;border-radius:12px;padding:18px;text-align:center;font-family:var(--serif)}
.report-actions{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 20px}
.sev{font-size:12px;font-weight:700;padding:2px 9px;border-radius:6px;color:#fff}

.disclaimer-box{font-size:12.5px;color:var(--muted);line-height:1.7;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:16px}
footer.site{background:var(--ink);color:#cdd6d0;padding:36px 0;font-size:14px}
footer.site a{color:#fff}
footer.site .legal-links{margin-top:10px;display:flex;gap:18px;flex-wrap:wrap}
footer.site .legal-links a{color:#9fb0a7}

/* toast + loading */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;z-index:400;box-shadow:var(--shadow)}
.loading-bg{position:fixed;inset:0;background:rgba(246,239,226,.85);backdrop-filter:blur(3px);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--pine);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.pbar{width:300px;max-width:78vw;height:9px;border-radius:99px;background:var(--line);overflow:hidden}
.pbar i{display:block;height:100%;width:0;background:var(--pine);transition:width .4s}
.lstage{font-size:13px;color:var(--muted);min-height:18px}

@media print{header.site,footer.site,.report-actions,.no-print{display:none!important}body{background:#fff}.rsec{break-inside:avoid;box-shadow:none}.page{padding:0}}
</style>
</head>

<script>
/* ============================================================
   YiminScope 移民雷达 — 单文件 SPA
   架构沿用 OfferScope：RENDER 路由表 + history + localStorage
   评分为「移民竞争力/匹配度」，非签证/绿卡批准概率。
============================================================ */
const $=(s,r)=>(r||document).querySelector(s);
const app=()=>document.getElementById('app');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
try{if('scrollRestoration' in history)history.scrollRestoration='manual';}catch(e){}

/* ---------------- 常量：国家 / 路径 ---------------- */
const PATHS={
  skilled:{label:"技术 / 工作移民",short:"技术移民"},
  talent:{label:"高端 / 杰出人才",short:"人才引进"},
  invest:{label:"投资移民",short:"投资移民"},
  startup:{label:"创业移民",short:"创业移民"},
  study:{label:"留学转移民",short:"留学转移"},
  family:{label:"亲属团聚",short:"亲属团聚"},
};
// 各路径的要素权重原型（age,edu,exp,lang,funds,adapt）总和≈1
const PATH_W={
  skilled:{age:.18,edu:.24,exp:.22,lang:.24,funds:.02,adapt:.10},
  talent: {age:.10,edu:.30,exp:.28,lang:.16,funds:.04,adapt:.12},

};
// 国家配置：开放度按路径调节（>1 更易，<1 更难），lang 指定主语言
const COUNTRIES={
  canada:   {flag:"🇨🇦",name:"加拿大",en:"Canada",lang:"en",paths:["skilled","study","startup","invest","family"],
    open:{skilled:1.05,study:1.0,startup:.95,invest:.85,family:.95}, note:"Express Entry 联邦快速通道 + 省提名（PNP），打分制（CRS）。"},

  singapore:{flag:"🇸🇬",name:"新加坡",en:"Singapore",lang:"en",paths:["skilled","invest","study"],

  hongkong: {flag:"🇭🇰",name:"中国香港",en:"Hong Kong",lang:"en",paths:["talent","skilled","study","invest"],
    open:{talent:1.05,skilled:1.0,study:1.05,invest:.95}, note:"高才通 TTPS / 优才 QMAS 打分 / 留学进修 IANG。"},
  germany:  {flag:"🇩🇪",name:"德国",en:"Germany",lang:"de",paths:["skilled","study","startup"],
    open:{skilled:1.0,study:1.0,startup:.9}, note:"欧盟蓝卡（EU Blue Card），看认证学历 + 工作合同 + 薪资。"},

/* ---------------- 评分引擎（规则化、确定性） ---------------- */
function ageScore(a){a=+a||0; if(a<18)return .25; if(a<=24)return .85; if(a<=30)return 1; if(a<=35)return .95; if(a<=40)return .78; if(a<=45)return .55; if(a<=50)return .32; return .15;}
function eduScore(level,overseas){const m={"高中及以下":.2,"大专":.45,"本科":.7,"硕士":.88,"博士":1}; let s=m[level]??.5; if(overseas)s=Math.min(1,s+.1); return s;}
function expScore(y,mgmt){y=+y||0; let s; if(y<=0)s=.1; else if(y<=2)s=.38; else if(y<=5)s=.66; else if(y<=9)s=.86; else s=1; if(mgmt)s=Math.min(1,s+.06); return s;}
function engScore(level){const m={"几乎不会":0,"基础（能日常）":.28,"中等（雅思5-6）":.52,"良好（雅思6.5-7）":.8,"优秀（雅思7.5+）":1}; return m[level]??.4;}
function fundsScore(f){const m={"50万以下":.05,"50–200万":.32,"200–500万":.58,"500–1000万":.82,"1000万以上":1}; return m[f]??.1;}
function adaptScore(A){let s=.12; const t=A.ties||[]; s+=Math.min(.6,t.length*.18); if(A.overseasEdu)s+=.12; if(A.spouseStrong)s+=.1; return Math.min(1,s);}
// 针对国家主语言的“语言要素”得分：英语国家用英语；德/日可用对应语言或英语折算
function langForCountry(A,c){const eng=engScore(A.englishLevel); if(c.lang==="en")return eng;
  if(c.lang==="de"){const de=({"无":0,"基础":.4,"中等":.7,"流利":1})[A.deLevel||"无"]||0; return Math.max(de, eng*.55);}
  if(c.lang==="ja"){const ja=({"无":0,"基础":.4,"中等":.7,"流利":1})[A.jaLevel||"无"]||0; return Math.max(ja, eng*.4);}
  return Math.max(eng*.5,.4); // 葡萄牙等：语言要求低，给基础分
}
function factorScores(A){
  return {
    age:ageScore(A.age),
    edu:eduScore(A.education,A.overseasEdu),
    exp:expScore(A.expYears,A.mgmt),
    lang:engScore(A.englishLevel),
    funds:fundsScore(A.funds),
    adapt:adaptScore(A),
  };
}
// 计算某国某路径的竞争力分（0-100）
function scoreCountryPath(A,ckey,pkey){
  const c=COUNTRIES[ckey]; const w=PATH_W[pkey]; if(!c||!w)return 0;
  const f={age:ageScore(A.age),edu:eduScore(A.education,A.overseasEdu),exp:expScore(A.expYears,A.mgmt),
    lang:langForCountry(A,c),funds:fundsScore(A.funds),adapt:adaptScore(A)};
  let s=0,wt=0; for(const k in w){s+=w[k]*f[k];wt+=w[k];}
  s=s/wt; // 归一
  const open=(c.open&&c.open[pkey])||1;
  s=s*open;
  // 路径硬约束修正
  if(pkey==="family"&&!(A.ties||[]).includes("有海外亲属"))s*=.4;       // 无海外亲属，团聚基本不适用
  if(pkey==="invest"&&fundsScore(A.funds)<.3)s*=.5;                      // 投资路径资金不足
  if(pkey==="study"&&(+A.age||0)>45)s*=.7;                              // 年龄偏大留学转移较难
  if(pkey==="talent"&&eduScore(A.education,A.overseasEdu)<.7&&!A.mgmt)s*=.75;
  return Math.max(4,Math.min(99,Math.round(s*100)));
}
// 在用户选定的路径里，为该国挑最佳路径
function bestPathFor(A,ckey){
  const c=COUNTRIES[ckey]; const cand=(A.paths&&A.paths.length?A.paths:c.paths).filter(p=>c.paths.includes(p));
  const list=(cand.length?cand:c.paths).map(p=>({p,score:scoreCountryPath(A,ckey,p)})).sort((a,b)=>b.score-a.score);
  return list[0];
}
function tierOf(s){ if(s>=78)return{k:"high",label:"高度匹配",color:"var(--t-high)"};
  if(s>=62)return{k:"mid",label:"较有机会",color:"var(--t-mid)"};
  if(s>=45)return{k:"low",label:"有难度·需提升",color:"var(--t-low)"};
  return{k:"none",label:"暂不建议·路径受限",color:"var(--t-none)"};}
function gradeOf(s){ if(s>=85)return"A"; if(s>=75)return"B+"; if(s>=65)return"B"; if(s>=55)return"C+"; if(s>=45)return"C"; return"D";}

function computeResult(A){
  const targets=(A.countries&&A.countries.length?A.countries:COUNTRY_ORDER.slice(0,5));
  const rows=targets.map(ck=>{const bp=bestPathFor(A,ck);const c=COUNTRIES[ck];const t=tierOf(bp.score);
    return {key:ck,flag:c.flag,name:c.name,score:bp.score,path:bp.p,pathLabel:PATHS[bp.p].short,tier:t,note:c.note};
  }).sort((a,b)=>b.score-a.score);
  const overall=rows.length?rows[0].score:0;
  const f=factorScores(A);
  const factors=[
    {key:"age",name:"年龄",score:Math.round(f.age*100)},
    {key:"edu",name:"学历",score:Math.round(f.edu*100)},
    {key:"lang",name:"语言",score:Math.round(f.lang*100)},
    {key:"exp",name:"工作经验",score:Math.round(f.exp*100)},
    {key:"funds",name:"资金实力",score:Math.round(f.funds*100)},
    {key:"adapt",name:"适应力 / 关联",score:Math.round(f.adapt*100)},
  ];
  // 风险点（规则）
  const risks=[];
  if(f.lang<.5)risks.push("语言尚未达到主流技术移民门槛，需要尽快考出合格的雅思 / 同等成绩。");
  if((+A.age||0)>=40)risks.push("年龄在多数打分制里已过加分高峰，建议优先考虑对年龄不敏感的路径（如投资 / 雇主担保 / 香港高才）。");
  if(f.edu<.7)risks.push("学历层次会限制部分技术移民与人才通道，可考虑先海外读书再转移民。");
  if(f.exp<.5)risks.push("可计算的工作经验偏少，技术移民竞争力受限。");
  if(f.funds<.3&&(A.paths||[]).some(p=>p==="invest"||p==="startup"))risks.push("当前资金量对投资 / 创业类路径偏紧，需重新评估预算或换路径。");
  if(!risks.length)risks.push("整体条件均衡，建议聚焦 1–2 个最匹配国家深入准备，避免分散精力。");
  return {overall,grade:gradeOf(overall),rows,factors,risks:risks.slice(0,4),factorRaw:f};
}

}

/* ---- 追问 ---- */
function buildFollowUp(){
  const qs=[];
  if(engScore(A.englishLevel)<.8)qs.push({q:"你是否已有有效的英语成绩（雅思/托福/PTE）？分数大概多少？打算何时考？",r:"语言分是技术移民最关键的可变项",key:"q_lang"});
  if((A.paths||[]).includes('invest')||(A.paths||[]).includes('startup'))qs.push({q:"用于投资/创业的资金大致是多少、资金来源是否可解释（合法证明）？",r:"投资类路径对资金额度与来源合规要求高",key:"q_funds"});
  qs.push({q:"你的职业具体是什么？是否接近目标国的紧缺职业清单？",r:"职业是否在清单上直接决定技术移民可行性",key:"q_occ"});
  if((+A.age||0)>=38)qs.push({q:"你能接受先以工签/留学等方式过渡，再转永居吗？",r:"年龄偏大时，过渡路径往往更现实",key:"q_bridge"});
  return qs.slice(0,3);
}
async function genFollowUp(){
  A.followUpQuestions=buildFollowUp();
  startProgress('移民雷达正在生成关键追问…',['读取你的背景','定位最影响判断的盲点','生成针对性追问'],6000);
  const ai=await aiPost('/api/follow-up',{profile:aiProfile()});
  await finishProgress();
  if(ai&&Array.isArray(ai.questions)&&ai.questions.length){
    A.followUpQuestions=ai.questions.slice(0,3).map(q=>({q:q.question||q.q||'',r:q.reason||q.r||'',key:q.fieldKey||q.key||('q'+Math.random().toString(36).slice(2,6))})).filter(x=>x.q);
  }
  saveDB();STEP=5;RENDER.assessment();window.scrollTo(0,0);
}

  const qs=A.followUpQuestions||[];

function saveFollowUp(){A.followUpAnswers=A.followUpAnswers||{};(A.followUpQuestions||[]).forEach(q=>{const el=$('#fu_'+q.key);if(el)A.followUpAnswers[q.key]=el.value;});saveDB();}

/* ---- 追问回馈到字段（让回答影响评分） ---- */
async function applyFollowUpCorrections(){
  const ai=await aiPost('/api/extract',{profile:{fields:{age:A.age,education:A.education,englishLevel:A.englishLevel,funds:A.funds,expYears:A.expYears,field:A.field},followUpQuestions:A.followUpQuestions,followUpAnswers:A.followUpAnswers}});
  const c=ai&&ai.corrections;if(c&&typeof c==='object'){
    if(c.englishLevel&&ENG_LEVELS.includes(c.englishLevel))A.englishLevel=c.englishLevel;
    if(c.funds&&FUNDS.includes(c.funds))A.funds=c.funds;
    if(c.expYears)A.expYears=c.expYears;
    if(c.occupationInDemand==='是')A.occInDemand=true;
    saveDB();
  }
}

    <p style="font-size:12px;color:var(--muted);margin-top:12px">${DISCLAIMER}</p>

async function startPay(productType){
  const e=($('#coEmail')?.value||'').trim();
  if(e&&!/.+@.+\..+/.test(e)){toast('邮箱格式好像不对，可修正或留空');return;}
  userEmail=e;localStorage.setItem('ys_email',e);
  const isWeChat=/MicroMessenger/i.test(navigator.userAgent);
  let payWin=null;
  if(!isWeChat){try{payWin=window.open('','_blank');}catch(err){}}
  showLoading('正在创建订单…');
  let r=null;
  try{const resp=await fetch('/api/pay/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({assessmentId:A.id,productType,channel:PAY_CHANNEL,email:e})});r=await resp.json();}catch(err){}
  if(!r||!r.ok){if(payWin){try{payWin.close();}catch(e){}}toast('创建订单失败，请稍后重试');return;}
  if(r.devMock){if(payWin){try{payWin.close();}catch(e){}}showPayWaiting(productType,r.outTradeNo,true);return;}
  if(isWeChat){try{window.open(r.payUrl,'_blank');}catch(e){try{location.href=r.payUrl;}catch(e2){}}}
  else if(payWin&&!payWin.closed){try{payWin.location.href=r.payUrl;}catch(e){}}
  else{try{window.open(r.payUrl,'_blank');}catch(e){}}
  showPayWaiting(productType,r.outTradeNo,false,r.payUrl);
}
function showPayWaiting(productType,outTradeNo,devMock,payUrl){
  window.scrollTo(0,0);
  app().innerHTML=`<div class="page"><div class="container" style="max-width:460px"><div class="panel" style="text-align:center">
    <div class="spinner" style="margin:6px auto 14px"></div>
    <h2 style="font-size:20px;font-family:var(--serif)">等待支付完成…</h2>
    <p style="color:var(--muted);font-size:14px;margin-top:8px">${devMock?'本地未配置真实支付。点下方按钮模拟支付成功以测试流程。':'请在新打开的页面用微信扫码支付，完成后本页会自动解锁报告。'}</p>
    ${devMock?`<button class="btn btn-clay btn-lg" style="margin-top:16px" onclick="devPay('${outTradeNo}','${productType}')">模拟支付成功（测试）</button>`:''}
    ${(!devMock&&payUrl)?`<a class="btn btn-clay btn-lg" style="margin-top:16px;display:inline-block;text-decoration:none" href="${payUrl}" target="_blank" rel="noopener">没有自动跳转？点此打开支付页面</a>`:''}
    <div style="margin-top:16px"><button class="btn btn-ghost" onclick="stopPayPoll();go('checkout','${productType}')">返回</button></div>
    <p style="font-size:12px;color:var(--muted);margin-top:12px" id="payPollHint"></p>
    ${(!devMock)?`<p style="font-size:12px;color:var(--muted);margin-top:6px">微信内若无法支付，请点右上角「···」用浏览器打开。</p>`:''}
  </div></div></div>`;
  if(!devMock)beginPayPoll(outTradeNo,productType);
}
function beginPayPoll(outTradeNo,productType){let n=0;stopPayPoll();PAY_POLL=setInterval(async()=>{n++;const h=$('#payPollHint');if(h)h.textContent=`已检测 ${n} 次…（最长约 5 分钟）`;
  try{const r=await fetch('/api/pay/status?outTradeNo='+encodeURIComponent(outTradeNo));const j=await r.json();if(j&&j.paid){stopPayPoll();markPaid(productType);}}catch(e){}
  if(n>=100)stopPayPoll();},3000);}
function stopPayPoll(){if(PAY_POLL){clearInterval(PAY_POLL);PAY_POLL=null;}}
function devPay(outTradeNo,productType){fetch('/api/pay/mock-paid?outTradeNo='+encodeURIComponent(outTradeNo)).then(()=>markPaid(productType));}
function markPaid(productType){A.isPaid=true;A.reportType=productType;saveDB();go('report');}

function ruleReport(){
  const res=A.freeResult||computeResult(A);
  const top=res.rows.slice(0,3);
  return {reportType:A.reportType||'premium_report',overall:res.overall,grade:res.grade,factors:res.factors,rows:res.rows,

}
